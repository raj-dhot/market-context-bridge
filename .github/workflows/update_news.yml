name: Weekly Deep-Dive News Fetcher

on:
  schedule:
    - cron: '0 13 * * 1' # Runs 6:00 AM PDT every Monday
  workflow_dispatch: 

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Libraries
        run: pip install -r requirements.txt

      - name: Run Scraper
        run: python fetch_news.py

      - name: Commit News to Repo
        run: |
          git config --global user.name "Market-Intelligence-Bot"
          git config --global user.email "bot@oceanfront.wealth"
          git add latest_news.txt
          git commit -m "Automated update: Weekly Market Intelligence [$(date +'%Y-%m-%d')]" || exit 0
          git push
